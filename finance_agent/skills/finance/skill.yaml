id: finance-v1
name: finance
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  AI-powered financial analysis agent that provides real-time stock data, market news, and investment insights.
  Combines YFinance data with web search to generate professional financial reports with clean markdown tables.

# Tags and Modes
tags:
  - finance
  - stock-analysis
  - market-data
  - investment-research
  - financial-reports

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json

# Example Queries
examples:
  - "analyze nvidia stock"
  - "what's the current price of AAPL"
  - "latest news about semiconductor stocks"
  - "show me key financial ratios for microsoft"
  - "compare tesla and ford financials"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Real-time financial analysis and market research"
    features:
      - "Live stock price and market data retrieval"
      - "Financial news search and analysis"
      - "Professional markdown table formatting"
      - "Investment insight generation"
      - "Financial ratio analysis"
    limitations: "Not for real-time trading or portfolio management"

  secondary_capability:
    supported: false
    planned_version: "TODO: Future version"
    description: "TODO: Planned feature description"

# Requirements
requirements:
  packages:
    - "yfinance>=0.2.50"
    - "duckduckgo-search>=6.0.0"
    - "agno>=2.2.0"
    - "bindu==2026.9.4"
  system:
    - "Python 3.12+"
  min_memory_mb: 256

# Performance Metrics
performance:
  avg_processing_time_ms: 2500
  max_concurrent_requests: 10
  memory_per_request_mb: 256
  scalability: horizontal

# Tool Restrictions
allowed_tools:
  - YFinanceTools
  - DuckDuckGoTools
  - Read
  - Write
  - Execute

# Rich Documentation
documentation:
  overview: |
    The Finance skill provides comprehensive financial analysis capabilities by combining real-time market data
    with the latest financial news. It uses YFinance for stock data and DuckDuckGo for news search, presenting
    results in professional markdown tables with clear formatting and disclaimers.

  use_cases:
    when_to_use:
      - "Stock analysis and investment research"
      - "Market trend identification and analysis"
      - "Financial ratio comparison and evaluation"
      - "News-driven investment insights"
      - "Quick financial data lookups and summaries"

    when_not_to_use:
      - "Real-time trading decisions or execution"
      - "Portfolio management or optimization"
      - "Tax, legal, or regulated financial advice"
      - "High-frequency trading analysis"
      - "Risk management for large portfolios"

  input_structure: |
    Accepts natural language queries about stocks, financial analysis, and market research.

    Examples:
    - "analyze nvidia stock"
    - "what's the current price of AAPL"
    - "latest news about semiconductor stocks"
    - "show me key financial ratios for microsoft"

    Constraints:
    - Queries should be about publicly traded companies
    - Cannot provide real-time trading advice
    - Market data may have slight delays
    - Always includes informational disclaimers

  output_format: |
    Produces professional financial reports with:

    1. Clear markdown tables for numerical data
    2. Bullet-pointed news summaries
    3. Concise analysis and insights
    4. Proper disclaimers

    Example Output:
    # NVIDIA Corp. (NVDA) - Stock Analysis

    ## Current Market Data
    | Metric | Value |
    |--------|-------|
    | Price | $177.19 |
    | P/E | 48.2 |
    | Market Cap | $644B |

    ## Recent News
    - Q4 2025 earnings beat expectations
    - New Hopper-X GPU announced
    - Analyst upgrades from major banks

    *Disclaimer: This information is for informational purposes only...*

  error_handling:
    - "API rate limits from YFinance or DuckDuckGo"
    - "Network connectivity issues for data retrieval"
    - "Invalid stock symbols or company names"
    - "Market data unavailable during exchange closures"
    - "Timeout behavior and fallback to cached data"

  examples:
    - title: "Stock Analysis Request"
      input:
        query: "analyze nvidia stock"
      output:
        success: true
        result:
          data: "Complete NVIDIA stock analysis with current price, P/E ratio, market cap, and recent news"
        metadata:
          processing_time_ms: 2500

    - title: "Current Price Inquiry"
      input:
        query: "what's current price of AAPL"
      output:
        success: true
        result:
          data: "Apple Inc. current stock price and key metrics"
        metadata:
          processing_time_ms: 1800

  best_practices:
    for_developers:
      - "Always validate stock symbols before API calls"
      - "Implement proper error handling for network requests"
      - "Cache frequently accessed market data to improve performance"
      - "Use consistent markdown formatting for all outputs"
      - "Include disclaimers for financial information"

    for_orchestrators:
      - "Route finance queries to this skill based on keywords like 'stock', 'price', 'analyze'"
      - "Chain with news skills for comprehensive market analysis"
      - "Consider load balancing during high-volume trading hours"
      - "Implement retry logic for failed API calls"
      - "Monitor API rate limits and usage patterns"

  installation: |
    The Finance skill is included in the finance-agent package.

    Required packages are automatically installed:
    - yfinance>=0.2.50 (market data)
    - duckduckgo-search>=6.0.0 (news search)
    - agno>=2.2.0 (agent framework)
    - bindu==2026.9.4 (agent infrastructure)

    System Requirements:
    - Python 3.12 or higher
    - 256MB minimum memory
    - Internet connection for real-time data

  versioning:
    - version: "1.0.0"
      date: "2026-03-02"
      changes: "Initial release with core financial analysis capabilities"
    - version: "1.1.0"
      status: "planned"
      changes: "Enhanced portfolio analysis and comparison features"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "stock analysis"
    - "market data"
    - "financial research"
    - "investment insights"
    - "stock price"
    - "market news"
    - "financial ratios"
    - "investment research"

  specializations:
    - domain: "financial markets"
      confidence_boost: 0.4
    - domain: "stock analysis"
      confidence_boost: 0.5
    - domain: "investment research"
      confidence_boost: 0.3

  anti_patterns:
    - "real-time trading advice"
    - "portfolio management"
    - "tax or legal financial advice"
    - "cryptocurrency analysis"
    - "forex trading analysis"

  complexity_indicators:
    simple:
      - "current stock price"
      - "basic company information"
      - "single stock analysis"
    medium:
      - "financial ratio analysis"
      - "company comparison"
      - "news-driven insights"
    complex:
      - "multi-stock portfolio analysis"
      - "sector-wide research"
      - "detailed financial modeling"
